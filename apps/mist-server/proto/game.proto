syntax = "proto3";

package game;

service GameService {
  rpc FetchGames (FetchGamesRequest) returns (FetchGamesResponse);
  rpc FetchCards (FetchCardsRequest) returns (FetchCardsResponse);
}

message FetchGamesRequest {
}

message FetchGamesResponse {
  repeated Game games = 1;
}

message FetchCardsRequest {
  string gameId = 1;
}

message FetchCardsResponse {
  repeated Card cards = 1;
}

message Game {
  string id = 1;
  string name = 2;
  string description = 3;
}

message Card {
  string id = 1;
  string name = 2;
  string gameId = 3;
}