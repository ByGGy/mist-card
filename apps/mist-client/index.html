<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mist Card | Project Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #0c0e11; color: #f9f9fd; }
      .font-headline { font-family: 'Space Grotesk', sans-serif; }
      .font-label { font-family: 'Manrope', sans-serif; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .glass-panel { background: rgba(35, 38, 42, 0.6); backdrop-filter: blur(24px); }
      .blueprint-grid { background-image: radial-gradient(rgba(105, 218, 255, 0.05) 1px, transparent 1px); background-size: 32px 32px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0c0e11; }
      ::-webkit-scrollbar-thumb { background: #23262a; border-radius: 10px; }
      
      /* Fix for input field text visibility */
      input, textarea, select {
        color: #f9f9fd !important;
        background-color: #111417 !important;
        border-color: #46484b !important;
      }
      
      input::placeholder, textarea::placeholder {
        color: #747579 !important;
        opacity: 1 !important;
      }
      
      /* Ensure buttons have proper text color */
      button {
        color: inherit !important;
      }
      
      /* Tailwind color classes for our dark theme */
      .bg-surface-container-low { background-color: #111417 !important; }
      .bg-surface-container { background-color: #171a1d !important; }
      .bg-surface-container-highest { background-color: #23262a !important; }
      .bg-surface-variant { background-color: #23262a !important; }
      .bg-primary { background-color: #69daff !important; }
      .bg-primary-container { background-color: #00cffc !important; }
      .bg-secondary-container { background-color: #591adc !important; }
      .bg-error { background-color: #ff6e84 !important; }
      
      .text-on-surface { color: #f9f9fd !important; }
      .text-on-surface-variant { color: #aaabaf !important; }
      .text-on-primary { color: #004a5d !important; }
      .text-on-secondary-container { color: #e4daff !important; }
      .text-on-error { color: #490013 !important; }
      .text-primary { color: #69daff !important; }
      .text-secondary { color: #a68cff !important; }
      .text-tertiary-container { color: #ff91da !important; }
      
      .border-outline-variant\/20 { border-color: rgba(70, 72, 75, 0.2) !important; }
      .border-outline-variant\/10 { border-color: rgba(70, 72, 75, 0.1) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
